<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MathQuest : MindMatch</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond&display=swap" rel="stylesheet">
<style>
  body { background: #F3F8DA; font-family: 'Poppins', sans-serif; }
  .title { font-family: 'Playfair Display', serif; font-weight: 700; color: #85A563;
           text-shadow: 2px 2px 5px rgba(0,0,0,0.15); }
  .card { perspective: 1000px; cursor: pointer; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    border-radius: 0.5rem; font-size: 16px; font-weight: bold; text-align: center; padding: 4px;
  }
  .card-front { background: #A7C085; color: white; }
  .card-back { background: #F3F8DA; border: 2px solid #85A563; color: #333; transform: rotateY(180deg); }
  .secondary-text { color: #333; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// DATA: 15+ Pairs per Grade
const GAME_CONTENT = {
  6: [
    {q:"3 x 7", a:"21"}, {q:"12 ÷ 4", a:"3"}, {q:"8 + 9", a:"17"}, {q:"15 - 6", a:"9"},
    {q:"6 x 6", a:"36"}, {q:"20 ÷ 5", a:"4"}, {q:"14 + 5", a:"19"}, {q:"18 - 7", a:"11"},
    {q:"9 x 9", a:"81"}, {q:"100 ÷ 10", a:"10"}, {q:"45 - 19", a:"26"}, {q:"25 + 34", a:"59"},
    {q:"7 x 8", a:"56"}, {q:"90 ÷ 9", a:"10"}, {q:"50 - 25", a:"25"}
  ],
  7: [
    {q:"1/2", a:"0.5"}, {q:"3/4", a:"0.75"}, {q:"25%", a:"0.25"}, {q:"2/5", a:"0.4"},
    {q:"1/3", a:"0.333..."}, {q:"4/5", a:"0.8"}, {q:"10%", a:"0.1"}, {q:"2/3", a:"0.666..."},
    {q:"12.5%", a:"0.125"}, {q:"5/8", a:"0.625"}, {q:"7/10", a:"0.7"}, {q:"9/20", a:"0.45"},
    {q:"33%", a:"1/3"}, {q:"75%", a:"3/4"}, {q:"20%", a:"1/5"}
  ],
  8: [
    {q:"Area of Circle (r=7)", a:"154"}, {q:"Area of Triangle (b=6,h=4)", a:"12"},
    {q:"Perimeter of Square (side=5)", a:"20"}, {q:"Area of Rectangle (l=8,w=3)", a:"24"},
    {q:"Circumference Circle (r=7)", a:"44"}, {q:"Area of Square (side=9)", a:"81"},
    {q:"Perimeter of Rectangle (l=10,w=4)", a:"28"}, {q:"Area of Parallelogram (b=6,h=5)", a:"30"},
    {q:"Area of Trapezium (a=8,b=6,h=4)", a:"28"}, {q:"Volume of Cube (side=3)", a:"27"},
    {q:"Volume of Cuboid (l=4,w=3,h=2)", a:"24"}, {q:"Surface Area of Cube (side=5)", a:"150"},
    {q:"Surface Area of Sphere (r=7)", a:"616"}, {q:"Area of Rhombus (d1=10,d2=8)", a:"40"}, {q:"Pythagoras: 3,4,?", a:"5"}
  ],
  9: [
    {q:"2x + 3x", a:"5x"}, {q:"(a+b)(a-b)", a:"a² - b²"},
    {q:"Expand (x+2)²", a:"x²+4x+4"}, {q:"Factorize x²-9", a:"(x-3)(x+3)"},
    {q:"Solve: x+5=12", a:"x=7"}, {q:"Simplify: 3(2x+1)", a:"6x+3"},
    {q:"(x+1)(x+1)", a:"x²+2x+1"}, {q:"2(x+3)=14", a:"x=4"},
    {q:"If y=2x, find y when x=3", a:"6"}, {q:"Factorize: x²+5x+6", a:"(x+2)(x+3)"},
    {q:"Expand: (x-4)(x+2)", a:"x²-2x-8"}, {q:"Solve: 2x=10", a:"x=5"},
    {q:"Factorize: a²+2a", a:"a(a+2)"}, {q:"Expand: (x+5)(x-1)", a:"x²+4x-5"}, {q:"Simplify: 4x+7x", a:"11x"}
  ],
  10: [
    {q:"Prob of rolling a 6", a:"1/6"}, {q:"Mean of [2,4,6,8]", a:"5"},
    {q:"Median of [1,3,5,7,9]", a:"5"}, {q:"Mode of [2,2,3,4,4,4]", a:"4"},
    {q:"Prob of coin head", a:"1/2"}, {q:"Range of [5,12,8]", a:"7"},
    {q:"Mean of [10,20,30]", a:"20"}, {q:"Prob of rolling even number", a:"1/2"},
    {q:"Prob of picking red card", a:"1/2"}, {q:"Mean of [1,2,3,4,5]", a:"3"},
    {q:"Variance of [2,2,2]", a:"0"}, {q:"Prob of rolling prime (2,3,5)", a:"1/2"},
    {q:"Prob of drawing ace from 52 cards", a:"1/13"}, {q:"Median of [2,4,6,8]", a:"5"}, {q:"Mode of [1,1,2,3]", a:"1"}
  ],
  11: [
    {q:"sin²θ + cos²θ", a:"1"}, {q:"tanθ", a:"sinθ/cosθ"},
    {q:"sec²θ - tan²θ", a:"1"}, {q:"cotθ", a:"cosθ/sinθ"},
    {q:"sin30°", a:"1/2"}, {q:"cos60°", a:"1/2"},
    {q:"tan45°", a:"1"}, {q:"sin90°", a:"1"}, {q:"cos0°", a:"1"},
    {q:"sin²A=1-cos²A", a:"Identity"}, {q:"1+tan²θ", a:"sec²θ"},
    {q:"1+cot²θ", a:"csc²θ"}, {q:"sin²θ/(1+cosθ)(1-cosθ)", a:"1"},
    {q:"cos²θ+sin²θ", a:"1"}, {q:"tan²θ+1", a:"sec²θ"}
  ],
  12: [
    {q:"d/dx (x²)", a:"2x"}, {q:"∫ x dx", a:"x²/2 + C"},
    {q:"d/dx (sinx)", a:"cosx"}, {q:"d/dx (cosx)", a:"-sinx"},
    {q:"∫ cosx dx", a:"sinx + C"}, {q:"∫ sinx dx", a:"-cosx + C"},
    {q:"d/dx (e^x)", a:"e^x"}, {q:"∫ e^x dx", a:"e^x + C"},
    {q:"d/dx (lnx)", a:"1/x"}, {q:"∫ 1/x dx", a:"ln|x| + C"},
    {q:"Derivative of x³", a:"3x²"}, {q:"∫ x² dx", a:"x³/3 + C"},
    {q:"Limit x→0 (sinx/x)", a:"1"}, {q:"d/dx (tanx)", a:"sec²x"}, {q:"∫ sec²x dx", a:"tanx + C"}
  ]
};

// Main Game Component
function MathMemoryGame() {
  const [grade, setGrade] = React.useState(6);
  const [cards, setCards] = React.useState([]);
  const [flipped, setFlipped] = React.useState([]);
  const [matched, setMatched] = React.useState([]);
  const [matchedPairs, setMatchedPairs] = React.useState([]);
  const [attempts, setAttempts] = React.useState(0);
  const [startTime, setStartTime] = React.useState(null);
  const [endTime, setEndTime] = React.useState(null);
  const [showAll, setShowAll] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [showRules, setShowRules] = React.useState(true);

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function initGame(selectedGrade) {
    const content = GAME_CONTENT[selectedGrade];
    let selected = shuffle([...content]).slice(0, 15);
    let pairs = [];
    selected.forEach((item, idx) => {
      pairs.push({id: idx+"q", value: item.q, type: "q"});
      pairs.push({id: idx+"a", value: item.a, type: "a"});
    });

    setCards(shuffle(pairs));
    setFlipped([]);
    setMatched([]);
    setMatchedPairs([]);
    setAttempts(0);
    setScore(0);
    setStartTime(Date.now());
    setEndTime(null);
    setShowAll(false);
  }

  React.useEffect(() => { initGame(grade); }, [grade]);

  const handleFlip = (cardId) => {
    if (showAll || flipped.length === 2 || flipped.includes(cardId) || matched.includes(cardId)) return;
    setFlipped(prev => [...prev, cardId]);
  };

  React.useEffect(() => {
    if (flipped.length === 2) {
      const [id1, id2] = flipped;
      const card1 = cards.find(c => c.id === id1);
      const card2 = cards.find(c => c.id === id2);

      setAttempts(prev => prev + 1);

      const content = GAME_CONTENT[grade];
      const isMatch = content.some(item =>
        (item.q === card1.value && item.a === card2.value) ||
        (item.a === card1.value && item.q === card2.value)
      );

      if (isMatch) {
        setMatched(prev => [...prev, id1, id2]);
        setMatchedPairs(prev => [...prev, {
          q: card1.type==="q"?card1.value:card2.value,
          a: card1.type==="a"?card1.value:card2.value
        }]);
        setScore(prev => prev + 2);
        setFlipped([]);
      } else {
        setTimeout(() => setFlipped([]), 1000);
      }

      // Set endTime if all matched
      if (matched.length + 2 === cards.length) {
        setEndTime(Date.now());
      }
    }
  }, [flipped, cards, grade, matched]);

  const handleShowAnswers = () => {
    setShowAll(true);
    setScore(prev => Math.max(0, prev - 0.5));
    setTimeout(() => setShowAll(false), 3000);
  };

  const total = 30;
  const passMark = 12;

  return (
    <div className="min-h-screen p-6 relative">
      <header className="flex items-center gap-3 mb-4">
        <img src="math-2.png" alt="Logo" className="w-16 h-20 rounded-none" />
        <h1 className="text-4xl title">MathQuest : MindMatch</h1>
      </header>

      <p className="mb-4 italic text-[#85A563]" style={{fontFamily:"'EB Garamond', serif"}}>
        Match the math problems with their answers!
      </p>

      {/* Controls */}
      <div className="mb-4 flex items-center gap-2">
        <label className="mr-2 font-semibold secondary-text">Select Grade:</label>
        <select value={grade} onChange={e => setGrade(Number(e.target.value))}
          className="p-2 border rounded bg-[#CBE2AC] secondary-text">
          {[6,7,8,9,10,11,12].map(g => <option key={g} value={g}>Grade {g}</option>)}
        </select>
        <button onClick={() => initGame(grade)}
          className="px-4 py-2 bg-[#85A563] text-white rounded-lg shadow hover:bg-[#72904f] secondary-text">
          Restart 🔄
        </button>
        <button onClick={handleShowAnswers}
          className="px-4 py-2 bg-[#CBE2AC] text-[#333] rounded-lg shadow hover:bg-[#b0ce94] secondary-text">
          Show Answers 👀
        </button>
      </div>

      {/* Main Grid */}
      <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
        {/* Cards Grid */}
        <div className="col-span-3">
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4 max-w-4xl">
            {cards.map(card => {
              const isFlipped = showAll || flipped.includes(card.id) || matched.includes(card.id);
              return (
                <div key={card.id}
                     className={`card w-24 h-24 ${isFlipped ? "flipped" : ""}`}
                     onClick={() => handleFlip(card.id)}>
                  <div className="card-inner">
                    <div className="card-front">?</div>
                    <div className="card-back">{card.value}</div>
                  </div>
                </div>
              )
            })}
          </div>
        </div>

        {/* Right Panel */}
        <div className="col-span-1 bg-[#D8E8C2] p-4 rounded-xl shadow">
          <h2 className="text-lg font-semibold text-[#85A563] mb-2 secondary-text">Matched Pairs :</h2>
          {matchedPairs.length === 0 && <p className="text-sm italic secondary-text">No matches yet . . .</p>}

          <ul className="space-y-2 secondary-text">
            {matchedPairs.map((pair, idx) => (
              <li key={idx} className="p-2 bg-[#F3F8DA] rounded shadow-sm text-sm flex justify-between">
                <span><strong>{pair.q}</strong> = {pair.a}</span>
                <span className="text-[#85A563] font-bold">+2</span>
              </li>
            ))}
          </ul>

          <div className="mt-4 p-2 bg-white rounded shadow font-medium secondary-text">
            <p>Total Marks: {score}/30</p>
            <div className="w-full bg-gray-200 rounded h-4 mt-2 overflow-hidden">
              <div className={`h-4 rounded transition-all duration-500 ${score >= 12 ? "bg-green-500" : "bg-red-500"}`}
                   style={{ width: `${(score / 30) * 100}%` }}></div>
            </div>
            <div className={`mt-2 font-bold ${score >= 12 ? "text-green-700" : "text-red-600"} secondary-text`}>
              {score >= 12 ? "✅ Pass" : "❌ Fail"}
            </div>
          </div>

          <div className="mt-6 p-4 bg-[#CBE2AC] rounded-xl shadow w-fit secondary-text">
            <p className="font-medium">Attempts: {attempts}</p>
            {endTime && <p className="font-medium">Time Taken: {Math.floor((endTime - startTime)/1000)}s</p>}
            {matched.length === cards.length && <p className="text-[#85A563] font-bold">🎉 All matched! Great job!</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MathMemoryGame />);
</script>
</body>
</html>
