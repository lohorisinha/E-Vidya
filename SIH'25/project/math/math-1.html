<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Probability Quest</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond&display=swap" rel="stylesheet">
<style>
  body { 
    background: #F3F8DA; 
    font-family: 'Poppins', sans-serif; 
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: #85A563;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.15);
  }
  .token { position: absolute; font-size: 2rem; transition: transform 0.5s ease-in-out; z-index: 10; }
  .snake, .ladder { font-size: 1.8rem; position: absolute; top:-5px; text-align:center; animation: bounce 1s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .dice { width: 60px; height: 60px; border-radius: 10px; background: #85A563; color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor:pointer; }
  .dice-animation { animation: shake 0.5s infinite; }
  @keyframes shake { 0%,100%{ transform: translate(0,0) rotate(0deg); } 25%{ transform: translate(2px,-2px) rotate(10deg); } 50%{ transform: translate(-2px,2px) rotate(-10deg); } 75%{ transform: translate(1px,-1px) rotate(5deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const QUESTIONS = [
 {q:"Probability of getting heads on a coin?",options:["1/2","1/3","1/4","1"],answer:"1/2"},
 {q:"Probability of rolling 6 on a die?",options:["1/6","1/2","1/4","1/3"],answer:"1/6"},
 {q:"Probability of drawing an Ace from a 52-card deck?",options:["1/13","1/52","1/4","1/12"],answer:"1/13"},
 {q:"Probability of rolling an even number on a die?",options:["1/2","1/3","1/6","1/4"],answer:"1/2"},
 {q:"Probability of rolling a number greater than 4?",options:["1/3","1/2","1/6","1/4"],answer:"1/3"},
 {q:"Probability of getting tails on a coin?",options:["1/2","1/3","1/4","1"],answer:"1/2"},
 {q:"Probability of rolling a 1 or 2 on a die?",options:["1/3","1/2","1/6","1/4"],answer:"1/3"},
 {q:"Probability of drawing a red card from a deck?",options:["1/2","1/3","1/4","1/6"],answer:"1/2"},
 {q:"Probability of rolling an odd number on a die?",options:["1/2","1/3","1/4","1/6"],answer:"1/2"},
 {q:"Probability of drawing a King from a deck?",options:["1/13","1/4","1/12","1/52"],answer:"1/13"},
 {q:"Probability of not getting heads on a coin?",options:["1/2","1/3","1/4","1"],answer:"1/2"},
 {q:"Probability of rolling a 3 on a die?",options:["1/6","1/2","1/3","1/4"],answer:"1/6"},
 {q:"Probability of drawing a black card from a deck?",options:["1/2","1/4","1/3","1/6"],answer:"1/2"},
 {q:"Probability of rolling less than 4 on a die?",options:["1/2","1/3","1/2","1/6"],answer:"1/2"},
 {q:"Probability of drawing a Queen from a deck?",options:["1/13","1/4","1/12","1/52"],answer:"1/13"},
 {q:"Probability of getting two heads in two coin tosses?",options:["1/4","1/2","1/3","1/6"],answer:"1/4"},
 {q:"Probability of rolling two sixes in two dice?",options:["1/36","1/12","1/18","1/6"],answer:"1/36"},
 {q:"Probability of drawing two aces in succession without replacement?",options:["1/221","1/169","1/52","1/13"],answer:"1/221"},
 {q:"Probability of rolling a number divisible by 3?",options:["1/3","1/2","1/6","1/4"],answer:"1/3"},
 {q:"Probability of drawing a face card?",options:["3/13","1/2","1/4","1/6"],answer:"3/13"},
 {q:"Probability of getting at least one head in two coin tosses?",options:["3/4","1/2","1/3","1/6"],answer:"3/4"},
 {q:"Probability of rolling a number ≤4?",options:["2/3","1/2","3/6","1/4"],answer:"2/3"},
 {q:"Probability of drawing a number card?",options:["2/3","1/2","1/4","1/3"],answer:"2/3"},
 {q:"Probability of getting exactly one tail in two tosses?",options:["1/2","1/3","1/4","1/6"],answer:"1/2"},
 {q:"Probability of rolling a prime number?",options:["1/2","1/3","1/6","1/4"],answer:"1/2"},
 {q:"Probability of drawing a red Queen?",options:["1/26","1/13","1/52","1/4"],answer:"1/26"},
 {q:"Probability of getting no heads in two tosses?",options:["1/4","1/2","1/3","1/6"],answer:"1/4"},
 {q:"Probability of rolling 1 or 3?",options:["1/3","1/2","1/6","1/4"],answer:"1/3"},
 {q:"Probability of drawing a Jack?",options:["1/13","1/4","1/12","1/52"],answer:"1/13"},
 {q:"Probability of getting heads then tails?",options:["1/4","1/2","1/3","1/6"],answer:"1/4"},
 {q:"Probability of rolling 2 dice and sum 7?",options:["1/6","1/12","1/8","1/9"],answer:"1/6"},
 {q:"Probability of drawing two red cards consecutively?",options:["25/102","1/2","1/4","1/6"],answer:"25/102"},
 {q:"Probability of rolling double odd numbers?",options:["1/4","1/2","1/3","1/6"],answer:"1/4"},
 {q:"Probability of drawing a non-face card?",options:["10/13","1/2","1/4","1/3"],answer:"10/13"},
 {q:"Probability of getting tails then heads?",options:["1/4","1/2","1/3","1/6"],answer:"1/4"},
 {q:"Probability of rolling at least one 6 in two dice?",options:["11/36","1/2","1/6","1/3"],answer:"11/36"},
 {q:"Probability of drawing a heart?",options:["1/4","1/2","1/6","1/3"],answer:"1/4"},
 {q:"Probability of rolling a 5 or 6?",options:["1/3","1/2","1/6","1/4"],answer:"1/3"},
 {q:"Probability of drawing a spade?",options:["1/4","1/2","1/6","1/3"],answer:"1/4"},
 {q:"Probability of rolling a number >2?",options:["2/3","1/2","1/6","1/4"],answer:"2/3"},
 {q:"Probability of drawing a red King?",options:["1/26","1/13","1/52","1/4"],answer:"1/26"},
 {q:"Probability of getting exactly 2 heads in 3 tosses?",options:["3/8","1/2","1/4","1/6"],answer:"3/8"},
 {q:"Probability of rolling sum 4 with 2 dice?",options:["3/36","1/12","1/6","1/9"],answer:"3/36"},
 {q:"Probability of drawing a black Queen?",options:["1/26","1/13","1/52","1/4"],answer:"1/26"},
 {q:"Probability of getting all tails in 3 tosses?",options:["1/8","1/2","1/4","1/6"],answer:"1/8"},
 {q:"Probability of rolling 3 or 5?",options:["1/3","1/2","1/6","1/4"],answer:"1/3"},
 {q:"Probability of drawing a club?",options:["1/4","1/2","1/6","1/3"],answer:"1/4"},
 {q:"Probability of getting exactly one head in 3 tosses?",options:["3/8","1/2","1/4","1/6"],answer:"3/8"},
 {q:"Probability of rolling a number <5?",options:["2/3","1/2","1/6","1/4"],answer:"2/3"},
 {q:"Probability of drawing a diamond?",options:["1/4","1/2","1/6","1/3"],answer:"1/4"},
 {q:"Probability of rolling sum 2 with 2 dice?",options:["1/36","1/12","1/6","1/9"],answer:"1/36"},
];

const BOARD_SIZE = 30;
const SNAKES_LADDERS = {
  3: 22,   // ladder
  5: 8,    // ladder
  11: 26,  // ladder
  20: 29,  // ladder
  27: 1,   // snake
  21: 9,   // snake
  17: 4    // snake
};

function MathsLudoApp(){
 const [playerPos, setPlayerPos] = React.useState(1);
 const [dice,setDice]=React.useState(1);
 const [currentQuestion,setCurrentQuestion]=React.useState(null);
 const [showQuestion,setShowQuestion]=React.useState(false);
 const [message,setMessage]=React.useState("");
 const [rolling,setRolling]=React.useState(false);
 const tokenRef = React.useRef(null);
 const diceIcons = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
 const [correctCount, setCorrectCount] = React.useState(0);
 const [wrongCount, setWrongCount] = React.useState(0);
 const [triesCount, setTriesCount] = React.useState(0);
 const [extraTurn, setExtraTurn] = React.useState(false);

 const rollDice = () => {
  if (rolling) return;
  setRolling(true);
  setMessage("🎲 Rolling dice ...");

  let counter = 0;
  const tempInterval = setInterval(() => {
    setDice(Math.floor(Math.random() * 6) + 1);
    counter++;
    if (counter > 10) { // after about 1 second
      clearInterval(tempInterval);
      setRolling(false);
      pickQuestion();   // now show a question
      setShowQuestion(true);
      setMessage("Answer the question to move.");
    }
  }, 100);
};

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const pickQuestion = () => {
  const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
  const shuffledOptions = shuffleArray([...q.options]); // copy and shuffle
  setCurrentQuestion({ ...q, options: shuffledOptions });
};

const submitAnswer = (ans) => {
    setTriesCount(prev => prev + 1); // every attempt increases tries
    if(ans.trim().toLowerCase() === currentQuestion.answer.trim().toLowerCase()){
        setMessage("✅ Correct! Moving the token...");
        setCorrectCount(prev => prev + 1); // correct answers
        setShowQuestion(false);
        movePlayer();
    } else {
        setMessage("❌ Wrong! Try again.");
        setWrongCount(prev => prev + 1); // wrong answers
    }
}

const movePlayer = () => {
    let nextPos = playerPos + dice;
    
    // Only move if nextPos does not exceed BOARD_SIZE
    if(nextPos > BOARD_SIZE){
        setMessage(`🎲 You need a ${BOARD_SIZE - playerPos} to move!`);
        return; // don't move
    }

    animateToken(playerPos, nextPos, () => {
        setPlayerPos(nextPos);
        let finalPos = SNAKES_LADDERS[nextPos] || nextPos;
        if (finalPos !== nextPos) {
            if (finalPos > nextPos) {
                setMessage(`You found a ladder! 🪜 Climb up to ${finalPos}.`);
            } else {
                setMessage(`Oh no, a snake! 🐍 Slide down to ${finalPos}.`);
            }
            setTimeout(() => {
                animateToken(nextPos, finalPos, () => {
                    setPlayerPos(finalPos);
                    if(finalPos === BOARD_SIZE){
                        setMessage("🎉 You reached the end!");
                    } else {
                        setMessage(`Your new position: ${finalPos}`);
                    }
                });
            }, 1000);
        } else if(finalPos === BOARD_SIZE){
            setMessage("🎉 You reached the end!");
        } else {
            setMessage(`Your new position: ${finalPos}`);
        }
    });
}

const animateToken = (from, to, onComplete)=>{
    if(from===to) { if(onComplete) onComplete(); return;}
    const ref = tokenRef.current;
    let current = from;
    const interval = setInterval(()=>{
        current += (from<to?1:-1);
        const row = Math.floor((current-1)/6);
        let col = (current-1)%6;
        if(row % 2 !== 0) col = 5 - col;
        
        const x = col*80 + 40 - 16; 
        const y = (4-row)*70 + 35 - 16; 
        ref.style.transform = `translate(${x}px, ${y}px)`;
        
        if(current===to){
            clearInterval(interval);
            if(onComplete) onComplete();
        }
    }, 200);
}

  React.useEffect(() => {
  if (tokenRef.current && playerPos > 0) {
    // Find the row/col of current player position
    const row = Math.floor((playerPos - 1) / 6);
    let col = (playerPos - 1) % 6;
    if (row % 2 !== 0) col = 5 - col;

    // Each tile is 100%/6 wide and 100%/5 tall
    const tileWidth = 500 / 6;  // since max-w-[500px]
    const tileHeight = 500 / 5;

    const x = col * tileWidth + tileWidth / 2 - 16;  // center the token
    const y = (4 - row) * tileHeight + tileHeight / 2 - 16;

    tokenRef.current.style.transform = `translate(${x}px, ${y}px)`;
  }
}, [playerPos]);

  return (
  <div className="min-h-screen p-6 relative">
    <header className="flex items-center gap-3 mb-4">
      <img src="math-1.png" alt="Logo" className="w-20 h-20 rounded-full" />
      <h1 className="text-4xl title">Dice of Destiny</h1>
    </header>

    {/* Subtitle */}
    <p className="mb-6"
       style={{ fontFamily: "'Times New Roman', serif", fontStyle: "italic", fontSize: "15px", color: "#A7C085" }}>
      Test your probability skills by answering the questions to move your token on the ludo board!
    </p>

    {/* Grid layout with 2:4:1 ratio */}
    <div className="grid grid-cols-1 lg:grid-cols-[2fr_4fr_1fr] gap-6">
      
      {/* LEFT COLUMN - Questions + Dice + Guide */}
      <div className="bg-[#CBE2AC] p-6 rounded-xl shadow flex flex-col justify-between">
        {/* Upper half - Questions */}
        <div className="flex-1">
          <h2 className="text-xl font-semibold mb-2"
          style={{ fontFamily: "'Hiragino Sans W8','sans-serif'", color: "#85A563" }}>
          Questions
          </h2>
          <p className="mb-4"
          style={{ fontFamily: "'Times New Roman', serif", fontSize: '15px', color: "#333" }}>
          Roll the die and solve the questions:
          </p>
          
          {showQuestion && currentQuestion && (
            <div>
              <p className="mb-2"
              style={{ fontFamily: "'Times New Roman', serif", fontSize: '15px', color: "#333" }}>
              {currentQuestion.q}
              </p>
              {currentQuestion.options.map(opt => (
                <button key={opt}
                onClick={() => submitAnswer(opt)}
                className="px-3 py-2 m-1 bg-[#A7C085] text-white rounded hover:bg-[#85A563]"
                style={{ fontFamily: "'Roboto', sans-serif", fontSize: '15px' }}>
                {opt}
                </button>
              ))}
            </div>
          )}
          
          <p className="mt-4"
          style={{ fontFamily: "'Times New Roman', serif", fontSize: '15px', color: "#333" }}>
          {message}
          </p>
        </div>
        
        {/* Lower half - Dice + Guide */}
        <div className="mt-6 grid grid-cols-[1fr_4fr] gap-4" style={{ minHeight: '120px' }}>
          {/* Dice */}
          <div className="flex justify-center items-center">
            <div
            onClick={playerPos < BOARD_SIZE && (!showQuestion || extraTurn) ? rollDice : undefined}
            className={`dice ${rolling ? 'dice-animation' : ''} ${playerPos >= BOARD_SIZE || showQuestion ? 'opacity-50 cursor-not-allowed' : ''}`}>
            {diceIcons[dice]}
            </div>
          </div>
          
          {/* Snakes & Ladders Guide */}
          <div className="flex flex-col justify-start">
            <h3 className="text-lg font-semibold text-[#85A563] mb-2"
            style={{ fontFamily: "'Times New Roman', serif", fontSize: '15px' }}>
            Snakes & Ladders Guide
            </h3>
            <ul className="space-y-1 text-sm overflow-y-auto" style={{ maxHeight: '100px' }}>
              {Object.entries(SNAKES_LADDERS).map(([start, end]) => (
                <li key={start}
                style={{ fontFamily: "'Times New Roman', serif", fontSize: '15px', color: "#333" }}>
                {end > start ? "🪜 Ladder" : "🐍 Snake"}: {start} → {end}
                </li>
              ))}
            </ul>
          </div>
        </div>
    </div>

      {/* MIDDLE COLUMN - Ludo Board */}
      <div className="bg-[#D8E8C2] p-6 rounded-xl shadow flex flex-col items-center justify-center">
        <h2 className="text-xl font-semibold mb-4 text-center" style={{ fontFamily: "'Hiragino Sans W8','sans-serif'", color: "#85A563" }}>
          Ludo Board</h2>
          
        {/* Grid board */}
        <div className="w-full max-w-[500px] aspect-square grid grid-rows-5 grid-cols-6 gap-0 relative">
          {/* Token */}
          <div ref={tokenRef} className="token absolute">🟢</div>

            {/* Tiles */}
            {Array.from({ length: BOARD_SIZE }, (_, gridIndex) => {
              const gridRow = Math.floor(gridIndex / 6); // 0 = top ... 4 = bottom
              const gridCol = gridIndex % 6;
              const rowFromBottom = 4 - gridRow; // 0 = bottom row ... 4 = top
              
              // serpentine numbering:
              const tileNumber =
              rowFromBottom % 2 === 0
              ? rowFromBottom * 6 + (gridCol + 1)
              : rowFromBottom * 6 + (6 - gridCol);
              
              return (
                <div key={gridIndex}
                className="border bg-[#F3F8DA] flex items-center justify-center relative"
                style={{ fontFamily: "'Roboto', sans-serif", fontSize: "15px" }}>
                {tileNumber}
                {SNAKES_LADDERS[tileNumber] && (
                  <span className={SNAKES_LADDERS[tileNumber] > tileNumber ? 'ladder' : 'snake'}
                    style={{ position: "absolute", zIndex: 20 }}>
                    {SNAKES_LADDERS[tileNumber] > tileNumber ? '🪜' : '🐍'}</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>

      {/* RIGHT COLUMN - Tracker */}
      <div className="bg-[#F3F8DA] p-4 rounded-xl shadow text-sm">
        <h2 className="text-lg font-semibold mb-2"
            style={{ fontFamily: "'Hiragino Sans W8','sans-serif'", color: "#85A563" }}>
            Tracker
        </h2>
        <p style={{ fontFamily: "'Roboto', sans-serif" }}>📝 Attempts: {triesCount}</p>
        <p style={{ fontFamily: "'Roboto', sans-serif" }}>✅ Correct: {correctCount}</p>
        <p style={{ fontFamily: "'Roboto', sans-serif" }}>❌ Wrong: {wrongCount}</p>
      </div>
    </div>
  </div>
);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MathsLudoApp />);
</script>
</body>
</html>
